# Pre-registered respondent model list.
# Tag this file as `prereg-v1` in git BEFORE running any model queries against DDI.
# Each entry must specify: id, family, modality, source, deterministic_decoding, version.

models:

  # --- Contrastively-trained image-text encoders ---
  - id: openai/clip-vit-large-patch14
    family: clip
    modality: image-text
    source: contrastive-zeroshot
    deterministic_decoding: true
    version: 2022-10-04
    notes: Reference contrastive baseline. Queried as zero-shot argmax over candidate labels (see protocol.yaml zero_shot_protocol).

  - id: google/siglip-large-patch16-384
    family: siglip
    modality: image-text
    source: contrastive-zeroshot
    deterministic_decoding: true
    version: 2024-01-12

  - id: microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224
    family: biomedclip
    modality: image-text
    source: contrastive-zeroshot
    deterministic_decoding: true
    version: 2023-03-01
    notes: Used both as a respondent AND as the primary embedding model. Track for circularity in the analysis.

  # --- Self-supervised vision encoders (paired with linear probe head trained on a held-out split) ---
  # optional: true excludes DINOv3 from the respondent panel. It serves as a
  # robustness embedding backbone (cross-backbone check in §prelim_cross_backbone)
  # and has a separate logistic-probe response set, but including it as an IRT
  # respondent would conflate the embedder with a respondent in the Rasch fit.
  - id: facebook/dinov3-vitl16-pretrain-lvd1689m
    family: dinov3
    modality: image
    source: huggingface
    deterministic_decoding: true
    version: 2025-08-14
    optional: true

  # --- Generatively-trained multimodal models (open-weights) ---
  # Pre-reg deviation 2026-05-23: llava-hf/llava-1.5-13b-hf (originally listed)
  # replaced by llava-hf/llava-v1.6-mistral-7b-hf (LLaVA-Next, 2024). The 1.5
  # checkpoint predates the 2024 instruction-tuning improvements and showed
  # prevalence-matching degeneracy patterns in pilot runs (same issue as CLIP).
  # LLaVA-1.6-Mistral is the current production checkpoint in the LLaVA family.
  - id: llava-hf/llava-v1.6-mistral-7b-hf
    family: llava
    modality: image-text
    source: huggingface
    deterministic_decoding: true
    version: 2024-01-30

  - id: Qwen/Qwen2-VL-7B-Instruct
    family: qwen-vl
    modality: image-text
    source: huggingface
    deterministic_decoding: true
    version: 2024-08-29

  - id: OpenGVLab/InternVL2-8B
    family: internvl
    modality: image-text
    source: huggingface
    deterministic_decoding: true
    version: 2024-07-04

  # --- Closed-API multimodal models ---
  - id: openai/gpt-4o-2024-11-20
    family: gpt-4o
    modality: image-text
    source: api-openai
    deterministic_decoding: false  # API does not expose deterministic decoding; temp set to 0.
    version: 2024-11-20

  - id: anthropic/claude-sonnet-4-5
    family: claude
    modality: image-text
    source: api-anthropic
    deterministic_decoding: false
    version: 2025-09-29

  # Pre-reg deviation 2026-05-11: gemini-2.0-flash (originally pre-registered)
  # was deprecated by Google before our query phase completed. We first
  # substituted gemini-3.1-pro-preview but that preview-tier model has a
  # ~250 requests/day quota that we exhausted before completing the panel.
  # Final substitution: gemini-3.1-flash-lite -- production tier (no quota
  # exhaustion issue), current 3.x family, Flash class (matches the original
  # Flash-tier pre-reg intent). Disclosed in paper limitations.
  - id: google/gemini-3.1-flash-lite
    family: gemini
    modality: image-text
    source: api-google
    deterministic_decoding: false
    version: 2026-05-11

  # --- Closed-API extension respondents (originally pre-registered as "optional --
  # run if budget allows"; activated 2026-05-21 to bring the panel from J=5 to
  # J=8 after the open-weight VLM extension was blocked by vLLM infrastructure
  # constraints documented in the paper limitations). ---
  - id: openai/gpt-4o-mini-2024-07-18
    family: gpt-4o
    modality: image-text
    source: api-openai
    deterministic_decoding: false
    version: 2024-07-18

  - id: anthropic/claude-haiku-4-5-20251001
    family: claude
    modality: image-text
    source: api-anthropic
    deterministic_decoding: false
    version: 2025-10-01

# Family-stratified DIF analysis groups.
# Items must have at least 2 models per family in the family-stratified analysis;
# families failing this threshold collapse into "other" with documentation.
family_groups:
  contrastive: [clip, siglip, biomedclip]
  self_supervised_vision: [dinov3]
  open_multimodal: [llava, qwen-vl, internvl]
  closed_api: [gpt-4o, claude, gemini]
