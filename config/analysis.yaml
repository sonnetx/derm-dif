# Pre-registered analysis decisions. Frozen at prereg-v1.

aggregate_dif:
  primary_endpoint: residualized_difficulty_shift
  comparison_groups:
    # FST groups are encoded as paired strings ("I-II", "III-IV", "V-VI")
    # in the loader; the prereg-v1 config had [V, VI] / [I, II] which match
    # zero items in this encoding. Deviation 2026-05-20: corrected to the
    # paired-string form so the pre-registered V--VI vs I--II contrast can
    # actually be computed. No change to the analytic intent.
    focal: ["V-VI"]
    reference: ["I-II"]
  residualize_against:
    # The DataFrame column is `malignant` (the malignancy-status boolean);
    # prereg-v1 had `malignancy` which is a KeyError. Deviation 2026-05-20:
    # corrected to the existing column name.
    - lesion_category
    - malignant
  bootstrap:
    n_resamples: 2000
    resample_units: [items, models]   # paired bootstrap over both
    seed: 0xDD1
  decision_rule:
    threshold_logits: 0.5
    require_ci_excludes_zero: true
  sensitivity_thresholds: [0.3, 0.7]

configural_invariance:
  metric: spearman_rank_correlation
  refit_on:
    - subset: fst_I_II
    - subset: fst_V_VI
  high_invariance_cutoff: 0.9

per_item_dif:
  status: exploratory_secondary
  methods: [lord_chi_square, mantel_haenszel, permutation_residual]
  fdr_q: 0.05
  permutation_n: 10000

lltm:
  nesting:
    - name: M0
      features: []
    - name: M1
      features: [lesion_category]
    - name: M2
      features: [lesion_category, malignant]
    - name: M3
      features: [lesion_category, malignant, fst_group]
    # Sensitivity: raw FST (no controls) — shows raw effect is already null,
    # ruling out that lesion-category control is hiding a true FST signal.
    - name: M_raw
      features: [fst_group]
    # Image-feature models (M_img, M_img_fst, M5, M6) are excluded: luminance
    # and channel means correlate with skin tone and would absorb FST signal as
    # a back-door confounder. Empirically these models explained r²=0.009 of
    # item difficulty variance regardless.
  primary_coefficient: fst_group
  bootstrap_n: 2000

mechanism:
  per_item_correlates:
    - image_resolution
    - mean_luminance
    - r_channel_mean
    - g_channel_mean
    - b_channel_mean
    - embedding_distance_to_fst_I_II_centroid

refusal_dif:
  status: primary_descriptive
  model: logistic_regression
  outcome: refused
  predictor: fst_group
  cluster_bootstrap_unit: model_id

amortized_validation:
  holdout_item_fraction: 0.20
  min_holdout_auc: 0.65   # below this -> fallback to traditional EM
  min_traditional_spearman: 0.7  # if traditional fit available
